name: Feature request
description: Propose a feature or improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        **Do not paste secrets.** Redact keys, tokens, passwords, private URLs, and any sensitive logs.

  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "As a <user>, I want <capability> so that <outcome>."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change and any user-facing behavior.
      placeholder: "What should QNSP do?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "What else did you try or consider?"
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact / priority
      description: Who benefits and how urgent is this?
      placeholder: "What workflows are blocked? What is the business impact?"
    validations:
      required: false

  - type: input
    id: area
    attributes:
      label: Area
      placeholder: "edge-gateway | storage | search | vault | kms | audit | web | cloud | docs"
    validations:
      required: false
