name: Bug report
description: Report a bug in QNSP
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        **Do not paste secrets.** Redact keys, tokens, passwords, private URLs, and any sensitive logs.

  - type: checkboxes
    id: no_secrets
    attributes:
      label: Confirmation
      options:
        - label: "I confirm I am not submitting secrets or private data."
          required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: "What broke?"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include exact steps and any relevant request IDs (redacted).
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What actually happened? Include error messages (redacted)."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where did you see this?
      placeholder: "web | cloud | api | docs | local dev | production"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: If known, include the app version, commit SHA, or deployment tag.
      placeholder: "e.g. prod-latest / 7175dab / v0.0.1"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / OS (if applicable)
      placeholder: "e.g. Chrome 122 / macOS 14"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (redacted)
      description: Paste only non-sensitive snippets. Redact tokens, credentials, and URLs that include secrets.
      render: shell
    validations:
      required: false
